baseURL = 'https://example.org/'
locale = 'zh-cn'
title = 'My Blog'
theme = 'PaperMod'

[params]
  author = 'My Name'
  description = '个人博客'

  [params.homeInfoParams]
    Title = '欢迎 👋'
    Content = '这是个人博客，记录学习与思考。'

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/'

[menu]
  [[menu.main]]
    name = '归档'
    url = '/archives'
    weight = 10
  [[menu.main]]
    name = '标签'
    url = '/tags'
    weight = 20
  [[menu.main]]
    name = '搜索'
    url = '/search'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.highlight]
    noClasses = false
